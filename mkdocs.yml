site_name: "KowerKoint's /etc"
site_description: 環境構築・設定の技術メモ
site_url: https://note.kowerkoint.com/

theme:
  name: material
  language: ja
  palette:
    scheme: frappe
    primary: custom
    accent: custom
  font:
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

docs_dir: docs

nav:
  - Home: index.md
